name: "🚀 Feature Request"
description: "Submit a proposal for a new feature for ChatbotX."
title: "[Feature]: <Short description>"
labels: ["enhancement", "feature-request"]
body:
  - type: markdown
    attributes:
      value: |
        Welcome to the ChatbotX Feature Requests! Your ideas help us build a better omnichannel agentic chatbot platform. 💡
  
  - type: dropdown
    id: area
    attributes:
      label: "🎯 Feature Area"
      description: "Which part of ChatbotX does this feature apply to?"
      options:
        - "Visual Flow Builder"
        - "AI Agent & Models (OpenAI, DeepSeek, Gemini)"
        - "Live Chat Inbox & CRM"
        - "Integrations & Channels (WhatsApp, Messenger, Zalo, Telegram, Email, Webchat)"
        - "Developer Tools (APIs, CLI, MCP Server)"
        - "Analytics & Reporting"
        - "Core Infrastructure / Other"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "🧐 Is your feature request related to a problem?"
      description: "A clear and concise description of what the problem is."
      placeholder: "e.g. I'm always frustrated when I cannot integrate a custom LLM provider..."
    validations:
      required: true
  
  - type: textarea
    id: solution
    attributes:
      label: "💡 Describe the solution you'd like"
      description: "A clear and concise description of what you want to happen."
      placeholder: "ChatbotX should allow adding custom OpenAI-compatible API endpoints in the AI settings..."
    validations:
      required: true
  
  - type: textarea
    id: alternatives
    attributes:
      label: "🔄 Describe alternatives you've considered"
      description: "A clear and concise description of any alternative solutions or features you've considered."
  
  - type: checkboxes
    id: checks
    attributes:
      label: "👀 Have you checked for existing requests?"
      options:
        - label: "I have searched the existing issues and found no similar feature request."
          required: true
